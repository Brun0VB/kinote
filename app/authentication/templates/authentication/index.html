{% load tailwind_tags %}
{% tailwind_css %}
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="" />
    <title>Login</title>

    <!-- Bootstrap & Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  </head>
  <body>
    <nav class="flex justify-center-safe items-center p-4 bg-neutral-950 border-b border-red-600">
      <div class="text-amber-500 flex space-x-4 items-center m-4">
        <div>
          <form method="post" action="{% url 'authentication:logout' %}">
              {% csrf_token %}
              <button class="btn bg-amber-500 hover:bg-rose-950" type="submit">Logout</button>
          </form>
        </div>
        <div>
          <form method="post" action="{% url 'authentication:password_change' %}">
              {% csrf_token %}
              <button class="btn bg-amber-500 hover:bg-rose-950" type="submit">Change Password</button>
          </form>
        </div>
      </div>
      <div class="flex">
        <a class="navbar-brand" href="#">
          <img src="https://preview.redd.it/here-is-the-full-image-of-the-tft-mel-icon-we-only-have-6-v0-d1d8j4u2bh6e1.jpeg?width=300&format=pjpg&auto=webp&s=6d4eade02067dca7c0da62989845364752c3565e" alt="Logo" width="30" height="24" class="d-inline-block align-text-top" />
        </a>
        <h1 class="text-2xl font-bold tracking-wider text-red-400">KINOTE</h1>
        <div class="space-x-4 text-white">
          <a href="#" class="hover:text-amber-400 transition">Grupos</a>
          <a href="#" class="hover:text-amber-400 transition">Avaliações</a>
        </div>
      </div>
    </nav>
    <div class="d-flex justify-content-center p-3">
      <form>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Email address</label>
          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" />
          <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input type="password" class="form-control" id="exampleInputPassword1" />
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1" />
          <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
