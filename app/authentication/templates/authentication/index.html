<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="" />
    <title>Login</title>

    <!-- Bootstrap & Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  </head>
  <body>
    <nav class="navbar navbar-dark bg-red-700">
      <div>
        <form method="post" action="{% url 'authentication:logout' %}">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
      </div>
      <div>
        <form method="post" action="{% url 'authentication:password_change' %}">
            {% csrf_token %}
            <button type="submit">Change Password</button>
        </form>
      </div>
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img src="https://64.media.tumblr.com/2cf088b4be07c555b26358296b05b599/e4116e9d45d44127-23/s1280x1920/94d4f588501807a55b2f1ccde22b168618e060ef.jpg" alt="Logo" width="30" height="24" class="d-inline-block align-text-top" />
          KinoteApp
        </a>
      </div>
    </nav>
    <div class="d-flex justify-content-center p-3">
      <form>
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">Email address</label>
          <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" />
          <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
        </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input type="password" class="form-control" id="exampleInputPassword1" />
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="exampleCheck1" />
          <label class="form-check-label" for="exampleCheck1">Check me out</label>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
      </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
